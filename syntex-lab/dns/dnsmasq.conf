# Syntex Lab — Local DNS Server
# Resolves *.syntex.local → 127.0.0.1 so tools like gobuster and nmap work
#
# Usage after docker compose up:
#   gobuster dns -d syntex.local --resolver 127.0.0.1:5353 -w wordlist.txt
#   nmap --dns-server 127.0.0.1 -sn 127.0.0.1
#
# WHY NOT SUBFINDER?
# subfinder uses external APIs (certificate transparency, Shodan, VirusTotal).
# .local domains are never in CT logs. Use gobuster/ffuf for vhost fuzzing instead.
#   ffuf -u http://127.0.0.1 -H "Host: FUZZ.syntex.local" -w wordlist.txt -mc 200,301,302,403,503

# Catch-all: resolve *.syntex.local → 127.0.0.1 (nginx)
address=/syntex.local/127.0.0.1

# Individual records for tools that do exact lookups
host-record=syntex.local,127.0.0.1
host-record=www.syntex.local,127.0.0.1
host-record=api.syntex.local,127.0.0.1
host-record=admin.syntex.local,127.0.0.1
host-record=staging.syntex.local,127.0.0.1
host-record=dev.syntex.local,127.0.0.1
host-record=cdn.syntex.local,127.0.0.1
host-record=program.syntex.local,127.0.0.1
host-record=mail.syntex.local,127.0.0.1
host-record=backup.syntex.local,127.0.0.1
host-record=vpn.syntex.local,127.0.0.1
host-record=intranet.syntex.local,127.0.0.1
host-record=git.syntex.local,127.0.0.1
host-record=jenkins.syntex.local,127.0.0.1
host-record=jira.syntex.local,127.0.0.1
host-record=confluence.syntex.local,127.0.0.1
host-record=prometheus.syntex.local,127.0.0.1
host-record=grafana.syntex.local,127.0.0.1
host-record=s3.syntex.local,127.0.0.1
host-record=db.syntex.local,127.0.0.1
host-record=redis.syntex.local,127.0.0.1
host-record=internal.syntex.local,127.0.0.1
host-record=legacy.syntex.local,127.0.0.1
host-record=old.syntex.local,127.0.0.1
host-record=test.syntex.local,127.0.0.1
host-record=beta.syntex.local,127.0.0.1
host-record=portal.syntex.local,127.0.0.1

# Disable DNS caching for lab (always fresh lookups)
cache-size=0
no-resolv
no-hosts
log-queries
