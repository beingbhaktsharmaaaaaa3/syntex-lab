x-common-env: &common-env
  NODE_ENV: production
  DB_HOST: db
  DB_PORT: 5432
  DB_NAME: syntex_db
  DB_USER: syntex_admin
  DB_PASS: Synx@2024!Prod
  SESSION_SECRET: syntex_session_secret_2024
  JWT_SECRET: secret123
  LAB_MODE: ${LAB_MODE:-beginner}
  UPLOAD_DIR: /app/public/uploads
  AWS_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
  AWS_SECRET_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
  S3_BUCKET: syntex-uploads-prod
  STRIPE_SK: sk_live_51Hfake_lab_only
  INTERNAL_API_KEY: int_key_9f8e7d6c5b4a3z2y1x
  INTERNAL_API_URL: http://10.0.0.50:8080
  GRAPHQL_INTROSPECTION: "true"
  WS_ENABLED: "true"

services:

  # ── DNS server — enables subdomain discovery tools ─────────
  dns:
    image: andyshinn/dnsmasq:latest
    container_name: syntex_dns
    restart: unless-stopped
    ports:
      - "127.0.0.1:5353:53/udp"
      - "127.0.0.1:5353:53/tcp"
    volumes:
      - ./dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
    cap_add:
      - NET_ADMIN
    networks:
      syntex_net:
        ipv4_address: 172.28.0.10

  # ── PostgreSQL database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: syntex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: syntex_db
      POSTGRES_USER: syntex_admin
      POSTGRES_PASSWORD: Synx@2024!Prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - syntex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntex_admin -d syntex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Main application ───────────────────────────────────────
  app:
    build: ./backend
    container_name: syntex_app
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
    volumes:
      - ./backend/public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - syntex_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy with all vhosts ───────────────────
  nginx:
    image: nginx:alpine
    container_name: syntex_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - syntex_net

volumes:
  postgres_data:

networks:
  syntex_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

