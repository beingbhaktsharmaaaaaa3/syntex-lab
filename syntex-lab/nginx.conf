events { worker_connections 1024; }

http {
    server_tokens on;  # intentional fingerprinting

    upstream app { server app:3000; }

    # ── syntex.local — main vulnerable target ─────────────────
    server {
        listen 80;
        server_name syntex.local www.syntex.local localhost;
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $http_x_forwarded_for;
            proxy_set_header   X-Vhost           "main";
        }
    }

    # ── program.syntex.local — bug bounty platform ────────────
    server {
        listen 80;
        server_name program.syntex.local bounty.syntex.local;
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Vhost           "program";
        }
    }

    # ── api.syntex.local ──────────────────────────────────────
    server {
        listen 80;
        server_name api.syntex.local;
        location / {
            proxy_pass         http://app/api/v1/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Vhost           "api";
        }
    }

    # ── admin.syntex.local ────────────────────────────────────
    server {
        listen 80;
        server_name admin.syntex.local;
        location / {
            proxy_pass         http://app/admin/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Vhost           "admin";
        }
    }

    # ── cdn.syntex.local — content delivery (source maps!) ───
    server {
        listen 80;
        server_name cdn.syntex.local;
        add_header X-CDN "Syntex-CDN/1.2";
        add_header X-Powered-By "Syntex CDN";
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Vhost           "cdn";
        }
    }

    # ── staging.syntex.local ──────────────────────────────────
    server {
        listen 80;
        server_name staging.syntex.local;
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Syntex-Env      "staging";
            proxy_set_header   X-Vhost           "staging";
        }
    }

    # ── dev.syntex.local ──────────────────────────────────────
    server {
        listen 80;
        server_name dev.syntex.local;
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Syntex-Env      "development";
            proxy_set_header   X-Vhost           "dev";
        }
    }

    # ── Dead subdomains (exist but return errors — recon practice) ──
    server { listen 80; server_name mail.syntex.local;        return 503 "Service Temporarily Unavailable"; }
    server { listen 80; server_name backup.syntex.local;      return 503 "Service Temporarily Unavailable"; }
    server { listen 80; server_name vpn.syntex.local;         return 403 "Forbidden";                       }
    server { listen 80; server_name intranet.syntex.local;    return 401 "Authentication Required";         }
    server { listen 80; server_name git.syntex.local;         return 200 "GitLab — Coming Soon";            }
    server { listen 80; server_name jenkins.syntex.local;     return 403 "Access Denied";                   }
    server { listen 80; server_name jira.syntex.local;        return 302 "http://syntex.local/login";       }
    server { listen 80; server_name prometheus.syntex.local;  return 200 "Prometheus — Metrics Server";     }
    server { listen 80; server_name grafana.syntex.local;     return 302 "http://syntex.local/login";       }
    server { listen 80; server_name s3.syntex.local;          return 200 "Syntex Storage Service";          }
    server { listen 80; server_name db.syntex.local;          return 503 "Database — Not HTTP";             }
    server { listen 80; server_name redis.syntex.local;       return 503 "Cache — Not HTTP";                }
    server { listen 80; server_name legacy.syntex.local;      return 301 "http://syntex.local";             }
    server { listen 80; server_name old.syntex.local;         return 301 "http://syntex.local";             }
    server { listen 80; server_name test.syntex.local;        return 200 "Test Environment";                }
    server { listen 80; server_name beta.syntex.local;        return 200 "Beta Portal — Invite Only";       }
    server { listen 80; server_name portal.syntex.local;      return 302 "http://syntex.local";             }
    server { listen 80; server_name internal.syntex.local;    return 401 "Internal Network Only";           }
}
